<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="card shadow-lg p-4">
            <h3 class="text-center mb-4">Confirm Email</h3>
            <p class="text-center text-muted mb-4">A 6-digit code has been sent to your email.</p>
            
            <form id="verify-form">
                <div class="mb-3">
                    <label class="form-label">Enter 6-digit OTP Code</label>
                    <input type="text" class="form-control text-center fw-bold fs-4" id="otp-code" maxlength="6" placeholder="000000" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Confirm Email</button>
            </form>
            
            <div id="verify-error" class="text-danger text-center mt-3"></div>
            
            <hr class="my-4">
            
            <div class="text-center">
                <button id="resend-otp-btn" class="btn btn-link text-decoration-none text-muted">Didn't receive code? Resend OTP</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="verify.js"></script>
</body>
</html>
