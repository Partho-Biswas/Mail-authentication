<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Confirmed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card shadow-lg p-5">
            <h1 class="text-success mb-4">Authentication Confirmed!</h1>
            <div id="user-details" class="lead mb-4">
                <p>Welcome, <span id="display-fullname" class="fw-bold text-primary"></span>!</p>
                <p>Email: <span id="display-email"></span></p>
                <div class="badge bg-success">Account Verified</div>
            </div>
            <button id="logout-btn" class="btn btn-outline-danger mt-3">Logout</button>
        </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://lsmilspxymyppnwtybso.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_I-cq5ZzXIfvPqSUn83X50w_DPPAvk7h';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            // Display user details from Supabase metadata and email
            document.getElementById('display-fullname').textContent = user.user_metadata.full_name || 'User';
            document.getElementById('display-email').textContent = user.email;

            document.getElementById('logout-btn').addEventListener('click', async () => {
                await supabaseClient.auth.signOut();
                window.location.href = 'auth.html';
            });
        });
    </script>
</body>
</html>
