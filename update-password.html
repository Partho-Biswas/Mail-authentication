<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="card shadow-lg p-4">
            <h3 class="text-center mb-4">Set New Password</h3>
            <p class="text-center text-muted mb-4">A reset code has been sent to your email.</p>
            
            <form id="update-password-form">
                <div class="mb-3">
                    <label class="form-label">Reset OTP Code</label>
                    <input type="text" class="form-control text-center fw-bold fs-4" id="reset-token" maxlength="8" placeholder="00000000" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" id="new-password" placeholder="Min. 6 characters" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirm-new-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Reset Password</button>
            </form>
            
            <div id="update-error" class="text-danger text-center mt-3"></div>
            
            <hr class="my-4">
            <div class="text-center">
                <a href="auth.html" class="text-decoration-none text-muted">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="update-password.js"></script>
</body>
</html>
