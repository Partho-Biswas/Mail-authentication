<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="card shadow-lg p-4">
            <h3 class="text-center mb-4">Reset Password</h3>
            <p class="text-center text-muted mb-4">Enter your email to receive a reset code.</p>
            
            <form id="forgot-password-form">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="reset-email" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Send Reset Code</button>
            </form>
            
            <div id="reset-error" class="text-danger text-center mt-3"></div>
            <div id="reset-success" class="text-success text-center mt-3"></div>
            
            <hr class="my-4">
            <div class="text-center">
                <a href="auth.html" class="text-decoration-none text-muted">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
